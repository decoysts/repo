<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1"> <meta http-equiv="refresh" content="300"> <title>Video Streams BPPK</title>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <style>
        /* Контейнер для видео: flexbox, центрирование */
        .video-container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        /* Каждый видео-элемент занимает половину ширины (2 колонки) */
        .video-item {
            flex: 1 1 calc(50% - 30px);
            max-width: calc(50% - 30px);
            box-sizing: border-box;
        }

        /* Адаптация для экранов шире 1280px */
        @media (max-width: 1280px) {
            .video-item {
                flex: 1 1 100%;
                max-width: 100%;
            }
        }

        body {
            background-color: black;
            color: white;
        }

        .bg-dark {
            background-color: black !important;
        }

        .text-white {
            color: white !important;
        }
    </style>
</head>
<body>

<div class="container mt-5">
    <div class="text-center mb-4">
        <h1>Live Video Streams BPPK</h1>
        <p>Watch multiple video streams digital cameras</p>
    </div>

    <div class="video-container">
        <div class="video-item">
            <video id="cam1" autoplay controls muted width="100%"></video>
        </div>

        </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>

<script>
    // СКРИПТ ДЛЯ ПЕРВОЙ КАМЕРЫ (id="cam1")
    function setupHls(videoId, streamUrl) {
        const video = document.getElementById(videoId);
        const videoSrc = streamUrl;

        if (Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(videoSrc);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, function() {
                video.play();
            });
        } 
        else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = videoSrc;
            video.addEventListener('loadedmetadata', function() {
                video.play();
            });
        }
    }

    // Инициализация камер (замени ipAddressWebServer на свой IP)
    setupHls('cam1', 'http://your-server-ip/ipAddress:port/stream.m3u8');
</script>

</body>
</html>
